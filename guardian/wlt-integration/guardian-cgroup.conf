# Phase 5.2: Guardian cgroup isolation config.
# Applied by wlt-init: creates a dedicated cgroup for the guardian daemon
# with memory + CPU limits so Guardian itself cannot become a DoS vector.
#
# Usage in wlt-init (before starting guardian):
#   mkdir -p /sys/fs/cgroup/guardian
#   echo 268435456 > /sys/fs/cgroup/guardian/memory.max   # 256MB
#   echo 20000    > /sys/fs/cgroup/guardian/cpu.max        # 20% (of 100000)
#   echo $$ > /sys/fs/cgroup/guardian/cgroup.procs         # then fork guardian
#
# This file documents the limits; wlt-init applies them at boot.

[cgroup]
path = /sys/fs/cgroup/guardian
# Memory limit: 256MB (guardian idle ~120MB, +134MB headroom for scans)
memory_max = 268435456
# CPU limit: 20% of one core (cpu.max format: "quota period")
# 20000/100000 = 20%
cpu_quota = 20000
cpu_period = 100000
# Disable oom-killer for guardian (prefer freeze over kill)
memory_oom_group = 0
