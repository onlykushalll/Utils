# WLTIOS Guardian configuration — default for the deployed image.
# Path on target: /etc/wlt/guardian/guardian.conf
# Ini-style: key = value (whitespace around = ignored, # = comment)

[guardian]
# Paths (all relative to the WLTIOS rootfs)
sigs_path       = /etc/wlt/guardian/guardian.yarc
fim_db_path     = /etc/wlt/guardian/fim.db
bpf_dir         = /etc/wlt/guardian/bpf/
ml_model_path   = /etc/wlt/guardian/anomaly.iforest
log_path        = /var/log/guardian.log
socket_path     = /run/guardian.sock
policy_path     = /etc/wlt/guardian/guardian.policy
net_ifname      = eth0

# Engine enables
enable_ebpf     = true
enable_fim      = true
enable_net      = true
enable_ml       = true
daemonize       = false

# Scan intervals (seconds)
fim_scan_interval_sec   = 300
ml_check_interval_sec   = 60
mem_scan_interval_sec   = 60
enable_mem_scan         = true

# Signed YARA updates over Tor (Phase 4.4: Tor consensus guard tracking)
update_url      =
update_pubkey_path = /etc/wlt/guardian/update_pubkey.pem
